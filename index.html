<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyborg UI - Neural Network</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #0d1117;
            --neon-green: #00ff41;
            --neon-cyan: #00e5ff;
            --neon-purple: #b026ff;
            --text-color: #e0e0e0;
            --border-color: #1f2937;
            --error-red: #ff2a2a;
        }

        body {
            margin: 0;
            padding: 2rem;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Share Tech Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* The Breathing Effect */
        @keyframes breathing {
            0% { box-shadow: 0 0 10px rgba(0, 229, 255, 0.2); }
            50% { box-shadow: 0 0 25px rgba(0, 229, 255, 0.5); }
            100% { box-shadow: 0 0 10px rgba(0, 229, 255, 0.2); }
        }

        .container {
            width: 100%;
            max-width: 800px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 2rem;
            animation: breathing 4s infinite ease-in-out;
        }

        h1 {
            color: var(--neon-cyan);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        .control-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
        }

        label {
            color: var(--neon-cyan);
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        input[type="text"],
        input[type="password"] {
            background-color: #000;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-green);
            padding: 0.8rem;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: box-shadow 0.3s;
        }

        input[type="text"]:focus,
        input[type="password"]:focus {
            box-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        input[type="range"] {
            flex-grow: 1;
            accent-color: var(--neon-purple);
        }

        #slider-value {
            color: var(--neon-purple);
            font-weight: bold;
            min-width: 2rem;
            text-align: right;
        }

        button {
            background-color: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            padding: 1rem;
            width: 100%;
            font-family: inherit;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: rgba(0, 255, 65, 0.1);
            box-shadow: 0 0 15px var(--neon-green);
            text-shadow: 0 0 5px var(--neon-green);
        }

        /* Loading State */
        #loading {
            display: none;
            text-align: center;
            color: var(--neon-purple);
            margin-top: 2rem;
            font-size: 1.2rem;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        /* Error State */
        #error-box {
            display: none;
            margin-top: 2rem;
            padding: 1rem;
            background-color: rgba(255, 42, 42, 0.1);
            border: 1px solid var(--error-red);
            color: var(--error-red);
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(255, 42, 42, 0.5);
        }

        /* The Matrix (Results) */
        #matrix-container {
            margin-top: 2rem;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 0.5rem;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 1rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .tab {
            padding: 0.5rem 1rem;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            background: transparent;
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            font-family: inherit;
            text-transform: uppercase;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab.active {
            color: var(--neon-cyan);
            border-color: var(--neon-cyan);
            border-bottom-color: var(--panel-bg);
            box-shadow: 0 -2px 10px rgba(0, 229, 255, 0.2);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Data Nodes */
        .data-node {
            background-color: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--neon-purple);
            border-radius: 4px;
            margin-bottom: 1rem;
            padding: 1rem;
            box-shadow: 0 0 10px rgba(176, 38, 255, 0.2);
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.5s, transform 0.5s;
        }

        .data-node.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .node-header {
            color: var(--neon-purple);
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            border-bottom: 1px solid rgba(176, 38, 255, 0.3);
            padding-bottom: 0.5rem;
            text-transform: uppercase;
        }

        .node-detail {
            margin: 0.5rem 0;
        }

        .label {
            color: var(--neon-cyan);
        }

        .value {
            color: var(--neon-green);
        }

        ul {
            list-style-type: square;
            color: var(--text-color);
            padding-left: 1.5rem;
            margin-top: 0.5rem;
        }

        li {
            margin-bottom: 0.3rem;
            color: var(--neon-green);
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Cyborg Neural Network</h1>

        <div class="control-group">
            <label for="api-key">Gemini API Key</label>
            <input type="password" id="api-key" placeholder="Enter API Key...">
        </div>

        <div class="control-group">
            <label for="target-herb">Target Herb</label>
            <input type="text" id="target-herb" placeholder="e.g., Turmeric">
        </div>

        <div class="control-group">
            <label for="max-urls">Max URLs</label>
            <div class="slider-container">
                <input type="range" id="max-urls" min="1" max="15" value="5">
                <span id="slider-value">5</span>
            </div>
        </div>

        <button id="extract-btn">Commence Neural Extraction</button>

        <div id="loading">Council Neural Link Active... Scraping and Parsing...</div>
        <div id="error-box"></div>

        <div id="matrix-container">
            <div class="tabs" id="tabs-container"></div>
            <div id="content-container"></div>
        </div>
    </div>

    <script>
        document.getElementById('max-urls').addEventListener('input', function() {
            document.getElementById('slider-value').textContent = this.value;
        });

        document.getElementById('extract-btn').addEventListener('click', async () => {
            const apiKey = document.getElementById('api-key').value.trim();
            const herbName = document.getElementById('target-herb').value.trim();
            const maxUrls = parseInt(document.getElementById('max-urls').value);

            const loadingEl = document.getElementById('loading');
            const errorEl = document.getElementById('error-box');
            const tabsContainer = document.getElementById('tabs-container');
            const contentContainer = document.getElementById('content-container');

            // Reset UI
            errorEl.style.display = 'none';
            tabsContainer.innerHTML = '';
            contentContainer.innerHTML = '';
            loadingEl.style.display = 'block';

            if (!apiKey || !herbName) {
                showError("API Key and Target Herb are required.");
                loadingEl.style.display = 'none';
                return;
            }

            try {
                const response = await fetch('http://127.0.0.1:8000/api/research', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        herb_name: herbName,
                        api_key: apiKey,
                        max_urls: maxUrls
                    })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.detail || `HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                loadingEl.style.display = 'none';
                renderMatrix(data);

            } catch (error) {
                loadingEl.style.display = 'none';
                showError(error.message);
            }
        });

        function showError(message) {
            const errorEl = document.getElementById('error-box');
            errorEl.textContent = `SYSTEM FAILURE: ${message}`;
            errorEl.style.display = 'block';
        }

        function renderMatrix(data) {
            const tabsContainer = document.getElementById('tabs-container');
            const contentContainer = document.getElementById('content-container');

            if (!data.mythologies || Object.keys(data.mythologies).length === 0) {
                showError("Extraction yielded empty matrix. No data found.");
                return;
            }

            let firstTab = true;
            let delay = 0;

            for (const [mythology, texts] of Object.entries(data.mythologies)) {
                // Create Tab
                const tab = document.createElement('button');
                tab.className = `tab ${firstTab ? 'active' : ''}`;
                tab.textContent = mythology;

                const contentDiv = document.createElement('div');
                contentDiv.className = `tab-content ${firstTab ? 'active' : ''}`;
                contentDiv.id = `content-${mythology}`;

                tab.addEventListener('click', () => {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    tab.classList.add('active');
                    contentDiv.classList.add('active');
                });

                tabsContainer.appendChild(tab);
                contentContainer.appendChild(contentDiv);

                // Create Data Nodes inside the tab
                for (const [textName, textData] of Object.entries(texts)) {
                    const node = document.createElement('div');
                    node.className = 'data-node';

                    const nomenclature = textData.original_nomenclature || 'Unknown';
                    const species = textData.resolved_species || 'Unknown';
                    const properties = textData.properties || [];

                    let propsHtml = properties.map(p => `<li>${p}</li>`).join('');

                    node.innerHTML = `
                        <div class="node-header">${textName}</div>
                        <div class="node-detail"><span class="label">Nomenclature:</span> <span class="value">${nomenclature}</span></div>
                        <div class="node-detail"><span class="label">Species:</span> <span class="value">${species}</span></div>
                        <div class="node-detail"><span class="label">Properties:</span></div>
                        <ul>${propsHtml}</ul>
                    `;

                    contentDiv.appendChild(node);

                    // The Growth Effect
                    setTimeout(() => {
                        node.classList.add('visible');
                    }, delay);
                    delay += 200; // stagger injection
                }

                firstTab = false;
            }
        }
    </script>
</body>
</html>
